openapi: 3.0.3
info:
  title: Library Management REST API
  description: REST API for managing users, books and book loans
  version: 1.0.0

servers:
- url: http://localhost:8080

tags:
- name: Auth
- name: Users
- name: Books
- name: Loans

paths:
  /api/v1/auth/register:
    post:
      tags: [ Auth ]
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              login: reader1
              password: secret123
              firstName: Ivan
              lastName: Petrov
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
              example:
                id: 1
                login: reader1
                firstName: Ivan
                lastName: Petrov
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: login, password, firstName and lastName are required
        '409':
          description: User already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: user already exists

  /api/v1/auth/login:
    post:
      tags: [ Auth ]
      summary: Login and get JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              login: reader1
              password: secret123
      responses:
        '200':
          description: JWT token returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              example:
                token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example.signature
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: login and password are required
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid login or password

  /api/v1/users:
    post:
      tags: [ Users ]
      summary: Create new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              login: reader2
              password: pass456
              firstName: Anna
              lastName: Smirnova
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
              example:
                id: 2
                login: reader2
                firstName: Anna
                lastName: Smirnova
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: login, password, firstName and lastName are required
        '409':
          description: User already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: user already exists

  /api/v1/users/by-login/{login}:
    get:
      tags: [ Users ]
      summary: Find user by login
      parameters:
      - in: path
        name: login
        required: true
        schema:
          type: string
        example: reader2
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
              example:
                id: 2
                login: reader2
                firstName: Anna
                lastName: Smirnova
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: user not found

  /api/v1/users/search:
    get:
      tags: [ Users ]
      summary: Find users by first and last name mask
      parameters:
      - in: query
        name: firstName
        required: false
        schema:
          type: string
        example: Ann
      - in: query
        name: lastName
        required: false
        schema:
          type: string
        example: Smir
      responses:
        '200':
          description: Search results returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
              example:
                items:
                - id: 2
                  login: reader2
                  firstName: Anna
                  lastName: Smirnova
                count: 1

  /api/v1/books:
    post:
      tags: [ Books ]
      summary: Add book to library
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBookRequest'
            example:
              title: War and Peace
              author: Leo Tolstoy
              year: 1869
      responses:
        '201':
          description: Book created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookResponse'
              example:
                id: 1
                title: War and Peace
                author: Leo Tolstoy
                year: 1869
                available: true
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: title and author are required
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: missing or invalid bearer token

  /api/v1/books/search:
    get:
      tags: [ Books ]
      summary: Find books by title or author
      parameters:
      - in: query
        name: title
        required: false
        schema:
          type: string
        example: War
      - in: query
        name: author
        required: false
        schema:
          type: string
        example: Tolstoy
      responses:
        '200':
          description: Search results returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookListResponse'
              example:
                items:
                - id: 1
                  title: War and Peace
                  author: Leo Tolstoy
                  year: 1869
                  available: true
                count: 1

  /api/v1/loans:
    post:
      tags: [ Loans ]
      summary: Create a book loan
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLoanRequest'
            example:
              userId: 2
              bookId: 1
              issuedAt: 2026-03-28
      responses:
        '201':
          description: Loan created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoanResponse'
              example:
                id: 1
                userId: 2
                bookId: 1
                issuedAt: 2026-03-28
                returnedAt: ""
                returned: false
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: userId, bookId and issuedAt are required
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: missing or invalid bearer token
        '404':
          description: User or book not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                userNotFound:
                  value:
                    error: user not found
                bookNotFound:
                  value:
                    error: book not found
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: book is already issued

  /api/v1/users/{userId}/loans:
    get:
      tags: [ Loans ]
      summary: Get loans of a user
      parameters:
      - in: path
        name: userId
        required: true
        schema:
          type: integer
        example: 2
      responses:
        '200':
          description: Loans returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoanListResponse'
              example:
                items:
                - id: 1
                  userId: 2
                  bookId: 1
                  issuedAt: 2026-03-28
                  returnedAt: ""
                  returned: false
                count: 1
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: user not found

  /api/v1/loans/{loanId}/return:
    patch:
      tags: [ Loans ]
      summary: Return a book
      security:
      - bearerAuth: []
      parameters:
      - in: path
        name: loanId
        required: true
        schema:
          type: integer
        example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReturnLoanRequest'
            example:
              returnedAt: 2026-04-05
      responses:
        '200':
          description: Loan updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoanResponse'
              example:
                id: 1
                userId: 2
                bookId: 1
                issuedAt: 2026-03-28
                returnedAt: 2026-04-05
                returned: true
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: returnedAt is required
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: missing or invalid bearer token
        '404':
          description: Loan not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: loan not found
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: book already returned

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    RegisterRequest:
      type: object
      required:
      - login
      - password
      - firstName
      - lastName
      properties:
        login:
          type: string
          example: reader1
        password:
          type: string
          example: secret123
        firstName:
          type: string
          example: Ivan
        lastName:
          type: string
          example: Petrov

    LoginRequest:
      type: object
      required:
      - login
      - password
      properties:
        login:
          type: string
          example: reader1
        password:
          type: string
          example: secret123

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example.signature

    UserResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        login:
          type: string
          example: reader1
        firstName:
          type: string
          example: Ivan
        lastName:
          type: string
          example: Petrov

    UserListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/UserResponse'
        count:
          type: integer
          example: 1

    CreateBookRequest:
      type: object
      required:
      - title
      - author
      properties:
        title:
          type: string
          example: War and Peace
        author:
          type: string
          example: Leo Tolstoy
        year:
          type: integer
          example: 1869

    BookResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: War and Peace
        author:
          type: string
          example: Leo Tolstoy
        year:
          type: integer
          example: 1869
        available:
          type: boolean
          example: true

    BookListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/BookResponse'
        count:
          type: integer
          example: 1

    CreateLoanRequest:
      type: object
      required:
      - userId
      - bookId
      - issuedAt
      properties:
        userId:
          type: integer
          example: 2
        bookId:
          type: integer
          example: 1
        issuedAt:
          type: string
          example: 2026-03-28

    ReturnLoanRequest:
      type: object
      required:
      - returnedAt
      properties:
        returnedAt:
          type: string
          example: 2026-04-05

    LoanResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        userId:
          type: integer
          example: 2
        bookId:
          type: integer
          example: 1
        issuedAt:
          type: string
          example: 2026-03-28
        returnedAt:
          type: string
          example: ""
        returned:
          type: boolean
          example: false

    LoanListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/LoanResponse'
        count:
          type: integer
          example: 1

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: user not found
